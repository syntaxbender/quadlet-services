server {

    listen 443 ssl;
    server_name otocafe-milan.syntaxbender.com;

    location / {
      proxy_pass       http://127.0.0.1:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
    }

      ssl_certificate         /etc/letsencrypt/live/syntaxbender.com/fullchain.pem;
      ssl_certificate_key     /etc/letsencrypt/live/syntaxbender.com/privkey.pem;
      include                 /etc/letsencrypt/options-ssl-nginx.conf;
      ssl_dhparam             /etc/letsencrypt/ssl-dhparams.pem;
      ssl_trusted_certificate /etc/letsencrypt/live/syntaxbender.com/chain.pem;
      ssl_stapling on;
      ssl_stapling_verify on;
}
