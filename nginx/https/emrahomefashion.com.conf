server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.emrahomefashion.com;

    location / {
      proxy_pass       http://127.0.0.1:3005;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
    }

    ssl_certificate         /etc/letsencrypt/live/emrahomefashion.com/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/emrahomefashion.com/privkey.pem;
    include                 /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam             /etc/letsencrypt/ssl-dhparams.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/emrahomefashion.com/chain.pem;
    ssl_stapling on;
    ssl_stapling_verify on;
}
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name emrahomefashion.com;

    ssl_certificate         /etc/letsencrypt/live/emrahomefashion.com/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/emrahomefashion.com/privkey.pem;
    include                 /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam             /etc/letsencrypt/ssl-dhparams.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/emrahomefashion.com/chain.pem;
    ssl_stapling on;
    ssl_stapling_verify on;

    return 301 https://www.emrahomefashion.com\$request_uri;
}
