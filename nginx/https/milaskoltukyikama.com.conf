server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name milaskoltukyikama.com;

    root /home/milaskoltuk/app;
    index index.html index.htm;

    # Ana route
    location / {
        try_files $uri $uri/ @rewrites;
    }

    # Static dosyalar
    location ~* \.(?:css|js|jpg|jpeg|png|gif|webp|svg|ico|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        access_log off;
        expires 30d;
    }

    # Gizli dosyalar
    location ~ /\.ht {
        deny all;
    }

    # Tüm PHP erişimini default kapat
    location ~ \.php$ {
        return 404;
    }

    # Rewrite kuralları
    location @rewrites {
        rewrite ^/galeri$ /fotogaleri.php last;
        rewrite ^/hakkımızda$ /hakkimizda.php last;
        rewrite ^/iletişim$ /iletisim.php last;
        return 404;
    }

    # Sadece izin verilen PHP dosyaları çalışsın
    location ~ ^/(fotogaleri|hakkimizda|iletisim)\.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:3010;

        fastcgi_param SCRIPT_FILENAME /app$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
    }

    ssl_certificate         /etc/letsencrypt/live/milaskoltukyikama.com/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/milaskoltukyikama.com/privkey.pem;
    include                 /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam             /etc/letsencrypt/ssl-dhparams.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/milaskoltukyikama.com/chain.pem;

    ssl_stapling on;
    ssl_stapling_verify on;
}

